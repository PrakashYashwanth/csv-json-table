<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="128" height="128" rx="28" fill="url(#grad1)"/>
  
  <!-- Table representation with modern design -->
  <g>
    <!-- Main table container -->
    <rect x="14" y="20" width="100" height="88" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Header background -->
    <rect x="14" y="20" width="100" height="18" rx="6" fill="url(#grad2)" opacity="0.9"/>
    
    <!-- Header cells with subtle separators -->
    <line x1="14" y1="38" x2="114" y2="38" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    
    <!-- Vertical column separators -->
    <line x1="39" y1="20" x2="39" y2="108" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    <line x1="64" y1="20" x2="64" y2="108" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    <line x1="89" y1="20" x2="89" y2="108" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Row separators -->
    <line x1="14" y1="56" x2="114" y2="56" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
    <line x1="14" y1="74" x2="114" y2="74" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
    <line x1="14" y1="92" x2="114" y2="92" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
    
    <!-- Data cell indicators (subtle circles) -->
    <circle cx="26" cy="47" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="51" cy="47" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="76" cy="47" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="101" cy="47" r="3" fill="#FFFFFF" opacity="0.6"/>
    
    <circle cx="26" cy="65" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="51" cy="65" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="76" cy="65" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="101" cy="65" r="3" fill="#FFFFFF" opacity="0.6"/>
    
    <circle cx="26" cy="83" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="51" cy="83" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="76" cy="83" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="101" cy="83" r="3" fill="#FFFFFF" opacity="0.6"/>
    
    <circle cx="26" cy="101" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="51" cy="101" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="76" cy="101" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="101" cy="101" r="3" fill="#FFFFFF" opacity="0.6"/>
  </g>
  
  <!-- JSON brackets accent in top right corner with glow effect -->
  <g>
    <circle cx="108" cy="18" r="16" fill="#FFFFFF" opacity="0.15"/>
    <text x="108" y="26" font-family="monospace" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" alignment-baseline="middle" opacity="0.9">{ }</text>
  </g>
  
  <!-- Subtle accent line -->
  <line x1="20" y1="112" x2="60" y2="112" stroke="#FFFFFF" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
</svg>
